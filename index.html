<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>점심 메뉴 & 로또</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <header>
      <div class="logo">🍴</div>
      <h1>오늘의 점심</h1>
      <p class="subtitle">LUNCH & LUCK</p>
    </header>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      LOADING...
    </div>

    <div id="app" style="display:none">
      <div class="section-header">
        <span class="section-title">오늘의 메뉴</span>
      </div>
      <div class="actions" id="lunchBoard"></div>

      <button class="btn btn-lotto" onclick="generateLotto()">🎱 로또 번호 뽑기</button>
      <div id="lottoResult" class="lotto-result" style="display:none">
        <div class="lotto-label">이번 주 행운의 번호</div>
        <div class="lotto-numbers" id="lottoNumbers"></div>
        <div class="lotto-bonus">
          <span class="lotto-plus">+</span>
          <span class="lotto-bonus-ball" id="lottoBonus"></span>
        </div>
      </div>

      <div class="modal-overlay" id="lunchModal" onclick="if(event.target===this)closeLunchModal()">
        <div class="lunch-modal-content" id="lunchModalContent"></div>
      </div>
    </div>
  </div>

  <script>
    // 1. 가시성 감지 (포커스 시 날짜 체크)
    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'visible') {
        checkAndReloadIfStale();
      }
    });

    // 2. 날짜 관련 유틸리티
    function getSeoulDateKey(date) {
      var offset = 9 * 60;
      var kstTime = new Date(date.getTime() + offset * 60000);
      return kstTime.toISOString().slice(0, 10);
    }

    function checkAndReloadIfStale() {
      var todayKey = getSeoulDateKey(new Date());
      var lastVisitKey = localStorage.getItem('lunch-last-visit-date');
      if (lastVisitKey && lastVisitKey !== todayKey) {
        localStorage.setItem('lunch-last-visit-date', todayKey);
        window.location.href = window.location.pathname + '?refresh=' + Date.now();
        return true;
      }
      localStorage.setItem('lunch-last-visit-date', todayKey);
      return false;
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    // 3. 점심 메뉴 로직
    var lunchItems = [];

    async function loadLunchMenus() {
      try {
        var response = await fetch('/api/lunch', { cache: 'no-store' });
        if (!response.ok) throw new Error('HTTP ' + response.status);
        var payload = await response.json();
        renderLunchBoard(payload.items || []);
      } catch (error) {
        renderLunchBoard([{
          name: '점심 메뉴',
          error: true,
          message: '메뉴를 불러오지 못했습니다.'
        }]);
      }
    }

    function renderLunchBoard(items) {
      lunchItems = items;
      var lunchBoard = document.getElementById('lunchBoard');
      if (!lunchItems.length) {
        lunchBoard.innerHTML = '<div class="lunch-modal-item" style="text-align:center;padding:20px;"><div class="lunch-sub">표시할 메뉴가 없습니다.</div></div>';
        return;
      }
      lunchBoard.innerHTML = lunchItems.map(function (item) {
        var errorContent = item.error ? '<div class="lunch-sub">' + escapeHtml(item.message) + '</div>' : '';
        var imgContent = item.imageUrl ? '<img class="lunch-modal-image" src="' + escapeHtml(item.imageUrl) + '">' : '';
        
        return '<div class="lunch-modal-item" onclick="showLunchModal()" style="cursor:pointer;">' +
               '<div class="lunch-name">' + escapeHtml(item.name) + '</div>' +
               errorContent + imgContent + '</div>';
      }).join('');
    }

    function showLunchModal() {
      var content = document.getElementById('lunchModalContent');
      content.innerHTML = lunchItems.map(function (item) {
        if (item.error) return '';
        return '<div class="lunch-modal-item">' +
               '<div class="lunch-name">' + escapeHtml(item.name) + '</div>' +
               '<img class="lunch-modal-image" src="' + escapeHtml(item.imageUrl) + '">' +
               '</div>';
      }).join('');
      document.getElementById('lunchModal').classList.add('active');
    }

    function closeLunchModal() {
      document.getElementById('lunchModal').classList.remove('active');
    }

    // 4. 로또 로직
    function generateLotto() {
      var nums = [];
      while (nums.length < 6) {
        var n = Math.floor(Math.random() * 45) + 1;
        if (nums.indexOf(n) === -1) nums.push(n);
      }
      nums.sort(function (a, b) { return a - b; });
      var bonus;
      do { bonus = Math.floor(Math.random() * 45) + 1; } while (nums.indexOf(bonus) !== -1);

      function ballColor(n) {
        if (n <= 10) return 'ball-yellow';
        if (n <= 20) return 'ball-blue';
        if (n <= 30) return 'ball-red';
        if (n <= 40) return 'ball-gray';
        return 'ball-green';
      }

      document.getElementById('lottoNumbers').innerHTML = nums.map(function (n) {
        return '<span class="lotto-ball ' + ballColor(n) + '">' + n + '</span>';
      }).join('');
      document.getElementById('lottoBonus').className = 'lotto-bonus-ball ' + ballColor(bonus);
      document.getElementById('lottoBonus').textContent = bonus;
      document.getElementById('lottoResult').style.display = 'block';
    }

    // 5. 초기화
    async function init() {
      if (checkAndReloadIfStale()) return;
      await loadLunchMenus();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    }

    init().catch(function (error) {
      document.getElementById('loading').innerHTML = '<div style="color:#e74c3c;">초기화 실패</div>';
    });
  </script>
</body>
</html>
