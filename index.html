<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>&#52964;&#54588;&#47672;&#49888; &#52397;&#49548; &#45817;&#48264;</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <header>
    <div class="logo">&#9749;</div>
    <h1>&#52964;&#54588;&#47672;&#49888; &#52397;&#49548;</h1>
    <p class="subtitle">WEEKDAY ASSIGNMENT</p>
  </header>

  <div class="pw-overlay" id="pwOverlay">
    <div class="pw-box">
      <div class="pw-logo">&#9749;</div>
      <div class="pw-title">&#52964;&#54588;&#47672;&#49888; &#52397;&#49548;</div>
      <div class="pw-sub">WEEKDAY ASSIGNMENT</div>
      <input class="pw-input" type="password" id="pwInput" placeholder="&#48708;&#48128;&#48264;&#54840; &#51077;&#47141;" onkeydown="if(event.key==='Enter')checkPw()">
      <button class="pw-btn" onclick="checkPw()">&#51077;&#51109;</button>
      <div class="pw-error" id="pwError">&#48708;&#48128;&#48264;&#54840;&#44032; &#50732;&#48148;&#47476;&#51648; &#50506;&#49845;&#45768;&#45796;</div>
    </div>
  </div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    LOADING...
  </div>

  <div id="app" style="display:none">
    <div class="notice show">&#51452;&#47568;&#51008; &#52397;&#49548; &#45817;&#48264;&#51060; &#50630;&#49845;&#45768;&#45796;. &#50900;&#50836;&#51068;&#48512;&#53552; &#44552;&#50836;&#51068;&#44620;&#51648;&#47564; &#44256;&#51221; &#50868;&#50689;&#54633;&#45768;&#45796;.</div>

    <div class="current-card">
      <div class="current-label"><span class="dot"></span>&#50724;&#45720; &#45817;&#48264;</div>
      <div class="current-name" id="currentName">-</div>
      <div class="current-date" id="currentDate"></div>
      <div id="currentStatus"></div>
    </div>

    <div class="section-header">
      <span class="section-title">&#51452;&#44036; &#44256;&#51221;&#54364;</span>
    </div>
    <div class="queue-list" id="weeklyList"></div>

    <div class="section-header" style="margin-top:20px">
      <span class="section-title">&#51216;&#49900; &#47700;&#45684;</span>
    </div>
    <div class="lunch-list" id="lunchList">
      <div class="lunch-card lunch-card-loading">&#51216;&#49900; &#47700;&#45684; &#51060;&#48120;&#51648;&#47484; &#48520;&#47084;&#50724;&#45716; &#51473;...</div>
    </div>
  </div>
</div>

<script>
  var CORRECT_PW_HASH = '%%APP_PASSWORD_HASH%%';

  var WEEK_SCHEDULE = [
    { dayIndex: 1, dayLabel: '\uC6D4\uC694\uC77C', shortLabel: 'MON', name: '\uAC15\uAD81\uD604' },
    { dayIndex: 2, dayLabel: '\uD654\uC694\uC77C', shortLabel: 'TUE', name: '\uAE40\uC815\uD0DC' },
    { dayIndex: 3, dayLabel: '\uC218\uC694\uC77C', shortLabel: 'WED', name: '\uC190\uD615\uC218' },
    { dayIndex: 4, dayLabel: '\uBAA9\uC694\uC77C', shortLabel: 'THU', name: '\uC720\uC9C0\uD5CC' },
    { dayIndex: 5, dayLabel: '\uAE08\uC694\uC77C', shortLabel: 'FRI', name: '\uC774\uC6A9\uD601' }
  ];

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  async function checkPw() {
    var input = document.getElementById('pwInput');
    var errEl = document.getElementById('pwError');
    var data = new TextEncoder().encode(input.value);
    var hashBuf = await crypto.subtle.digest('SHA-256', data);
    var hashHex = Array.from(new Uint8Array(hashBuf)).map(function(b) {
      return b.toString(16).padStart(2, '0');
    }).join('');

    if (hashHex === CORRECT_PW_HASH) {
      document.getElementById('pwOverlay').style.display = 'none';
      sessionStorage.setItem('auth', '1');
      return;
    }

    input.classList.add('error');
    errEl.style.display = 'block';
    setTimeout(function() { input.classList.remove('error'); }, 400);
    input.value = '';
  }

  if (sessionStorage.getItem('auth') === '1') {
    document.getElementById('pwOverlay').style.display = 'none';
  }

  function getSeoulWeekdayIndex(date) {
    var weekday = new Intl.DateTimeFormat('en-US', {
      timeZone: 'Asia/Seoul',
      weekday: 'short'
    }).format(date);

    var map = { Sun: 0, Mon: 1, Tue: 2, Wed: 3, Thu: 4, Fri: 5, Sat: 6 };
    return map[weekday];
  }

  function formatSeoulNow(date) {
    return new Intl.DateTimeFormat('ko-KR', {
      timeZone: 'Asia/Seoul',
      year: 'numeric',
      month: 'long',
      day: 'numeric',
      weekday: 'long'
    }).format(date);
  }

  function getTodayAssignment() {
    var today = new Date();
    var weekdayIndex = getSeoulWeekdayIndex(today);
    var assignment = WEEK_SCHEDULE.find(function(item) {
      return item.dayIndex === weekdayIndex;
    });

    return {
      today: today,
      weekdayIndex: weekdayIndex,
      assignment: assignment || null
    };
  }

  function renderCurrentCard() {
    var currentName = document.getElementById('currentName');
    var currentDate = document.getElementById('currentDate');
    var currentStatus = document.getElementById('currentStatus');
    var result = getTodayAssignment();

    currentDate.textContent = formatSeoulNow(result.today) + ' \uAE30\uC900';

    if (!result.assignment) {
      currentName.textContent = '\uC8FC\uB9D0 \uD734\uBB34';
      currentStatus.innerHTML = '<span class="status-badge skipped">\uD1A0\uC694\uC77C\uACFC \uC77C\uC694\uC77C\uC740 \uCCAD\uC18C \uC5C6\uC74C</span>';
      return;
    }

    currentName.textContent = result.assignment.name;
    currentStatus.innerHTML = '<span class="status-badge pending">' + result.assignment.dayLabel + ' \uB2F4\uB2F9\uC790</span>';
  }

  function renderWeeklyList() {
    var result = getTodayAssignment();
    var weeklyList = document.getElementById('weeklyList');

    weeklyList.innerHTML = WEEK_SCHEDULE.map(function(item, index) {
      var isToday = item.dayIndex === result.weekdayIndex;
      var tagClass = isToday ? 'queue-tag tag-current' : 'queue-tag';
      var tagText = isToday ? 'TODAY' : item.shortLabel;

      return (
        '<div class="queue-item' + (isToday ? ' is-current' : '') + '">' +
          '<span class="queue-num">' + String(index + 1).padStart(2, '0') + '</span>' +
          '<span class="queue-name">' + escapeHtml(item.dayLabel + ' · ' + item.name) + '</span>' +
          '<span class="' + tagClass + '">' + escapeHtml(tagText) + '</span>' +
        '</div>'
      );
    }).join('');
  }

  function renderLunchMenus(items) {
    var lunchList = document.getElementById('lunchList');

    if (!Array.isArray(items) || items.length === 0) {
      lunchList.innerHTML = '<div class="lunch-card lunch-card-empty">\uD45C\uC2DC\uD560 \uBA54\uB274 \uC774\uBBF8\uC9C0\uAC00 \uC5C6\uC2B5\uB2C8\uB2E4.</div>';
      return;
    }

    lunchList.innerHTML = items.map(function(item) {
      if (item.error) {
        return '' +
          '<div class="lunch-card lunch-card-empty">' +
            '<div class="lunch-meta">' +
              '<div>' +
                '<div class="lunch-name">' + escapeHtml(item.name) + '</div>' +
                '<div class="lunch-sub">' + escapeHtml(item.message) + '</div>' +
              '</div>' +
              '<a class="lunch-link" href="' + escapeHtml(item.channelUrl) + '" target="_blank" rel="noreferrer">\uCC44\uB110 \uBCF4\uAE30</a>' +
            '</div>' +
          '</div>';
      }

      return '' +
        '<article class="lunch-card">' +
          '<div class="lunch-meta">' +
            '<div>' +
              '<div class="lunch-name">' + escapeHtml(item.name) + '</div>' +
              '<div class="lunch-sub">' + escapeHtml(item.dateText || '\uCD5C\uC2E0 \uBA54\uB274 \uC774\uBBF8\uC9C0') + '</div>' +
            '</div>' +
            '<a class="lunch-link" href="' + escapeHtml(item.linkUrl) + '" target="_blank" rel="noreferrer">\uC6D0\uBCF8 \uBCF4\uAE30</a>' +
          '</div>' +
          '<a class="lunch-image-link" href="' + escapeHtml(item.linkUrl) + '" target="_blank" rel="noreferrer">' +
            '<img class="lunch-image" src="' + escapeHtml(item.imageUrl) + '" alt="' + escapeHtml(item.name) + ' \uC810\uC2EC \uBA54\uB274">' +
          '</a>' +
          '<div class="lunch-title">' + escapeHtml(item.description || item.title || '\uD504\uB85C\uD544 \uC774\uBBF8\uC9C0') + '</div>' +
        '</article>';
    }).join('');
  }

  async function loadLunchMenus() {
    try {
      var response = await fetch('/api/lunch', { cache: 'no-store' });
      if (!response.ok) throw new Error('HTTP ' + response.status);

      var payload = await response.json();
      renderLunchMenus(payload.items || []);
    } catch (error) {
      renderLunchMenus([
        {
          name: '\uC810\uC2EC \uBA54\uB274',
          error: true,
          channelUrl: '#',
          message: '\uBA54\uB274 \uC774\uBBF8\uC9C0\uB97C \uBD88\uB7EC\uC624\uC9C0 \uBABB\uD588\uC2B5\uB2C8\uB2E4.'
        }
      ]);
    }
  }

  async function init() {
    renderCurrentCard();
    renderWeeklyList();
    await loadLunchMenus();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }

  init().catch(function(error) {
    document.getElementById('loading').innerHTML =
      '<div style="color:#e74c3c;text-align:center">\uCD08\uAE30\uD654 \uC2E4\uD328<br><small>' +
      escapeHtml(error.message) +
      '</small></div>';
  });
</script>
</body>
</html>
